  </main>
  {% if HAS_MERMAID %}
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: document.documentElement.dataset.theme === 'dark' ? 'dark' : 'default',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif'
    });
    // Render after fonts are ready so node boxes are measured with the
    // same font they render in (otherwise the last glyph can clip).
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(function () { mermaid.run(); });
    } else {
      window.addEventListener('load', function () { mermaid.run(); });
    }
  </script>
  {% endif %}
  <footer>
    <div class="footer-links">
      <a href="{{ DISCORD_URL }}">Discord</a>
      <a href="{{ GITHUB_URL }}">GitHub</a>
    </div>
    <p>{{ COPYRIGHT_YEAR }} KakkoiSchool</p>
  </footer>
  <script src="{{ STATIC_PATH }}script.js"></script>
</body>
</html>
