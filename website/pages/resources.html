{% include "header.html" %}

    <section class="page-header">
      <h1>{{ resources_title }}</h1>
      <p>{{ resources_desc }}</p>
    </section>

    <div class="resources-grid">
      {% for resource in resources %}
      <a href="{{ resource.url }}" class="resource-card" target="_blank" rel="noopener">
        <h3>{{ resource.title }}</h3>
        <p>{{ resource.desc }}</p>
        <span class="resource-url">{{ resource.domain }}</span>
      </a>
      {% endfor %}
    </div>

{% include "footer.html" %}
