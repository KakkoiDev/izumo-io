{% include "header.html" %}

    <section class="page-header">
      <h1>{{ ai_title }}</h1>
      <p>{{ ai_desc }}</p>
    </section>

    <div class="theory-grid">
      {% for lesson in ai_lessons %}
      <a href="lessons/{{ lesson.id | slugify }}.html" class="theory-card">
        <span class="lesson-id">{{ lesson.id }}</span>
        <h3>{{ lesson.title }}</h3>
        <p>{{ lesson.desc }}</p>
      </a>
      {% endfor %}
    </div>

{% include "footer.html" %}
