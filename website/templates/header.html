<!doctype html>
<html lang="{{ HTML_LANG }}" data-page="{{ PAGE_FILE }}" data-lang-paths='{"en":"{{ EN_BASE }}","ja":"{{ JA_BASE }}"}'>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (!t) t = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <title>{% if PAGE_TITLE %}{{ PAGE_TITLE }} - {% endif %}KakkoiSchool</title>
  <link rel="icon" href="{{ STATIC_PATH }}favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="{{ STATIC_PATH }}style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="{{ NAV_PREFIX }}index.html" class="logo">KakkoiSchool</a>
    <div class="nav-links" id="nav-links">
      <a href="{{ NAV_PREFIX }}tech-lessons.html">{{ nav_tech }}</a>
      <a href="{{ NAV_PREFIX }}theory-lessons.html">{{ nav_theory }}</a>
      <a href="{{ NAV_PREFIX }}videos.html">{{ nav_videos }}</a>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <select class="lang-switch" aria-label="Language" onchange="switchLang(this.value)">
      {{ LANG_OPTIONS }}
    </select>
    <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <main>
