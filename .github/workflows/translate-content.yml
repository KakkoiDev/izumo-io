name: Translate content (JA + PT)

# Fills missing translations under content/ without ever overwriting
# existing translations. Triggers on pushes to master that touch
# content/, and on manual dispatch so we can bulk-seed new languages.

on:
  push:
    branches: [master]
    paths:
      - 'content/**.md'
      - 'content/*.yaml'
  workflow_dispatch:

# Serialize: if a translation run is already going, queue this one.
concurrency:
  group: translate-content
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install google-genai pyyaml

      - name: Run idempotent translator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/translate_content.py

      - name: Commit translations if any
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add content/
          if git diff --staged --quiet; then
            echo "No new translations to commit."
            exit 0
          fi
          git commit -m "Auto-translate content: fill missing JA + PT"
          git push
